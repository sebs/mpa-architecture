<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Offline — Pure MPA Shop</title>
  <style>
    body { margin: 3rem auto; max-width: 40rem; padding: 0 1rem; font-family: system-ui, sans-serif; line-height: 1.5; }
  </style>
</head>
<body>
  <h1>You are offline</h1>
  <p>This page is not cached yet. Pages you have visited before remain
    available offline; your cart data lives in this browser and is not
    affected.</p>
  <p><a href="../index.html">Try the start page</a></p>
  <script>
    // This document is served as the body of whatever navigation failed, so
    // relative links resolve against that URL. Point the link at the service
    // worker scope instead.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistration().then((registration) => {
        if (registration) document.querySelector('a').href = registration.scope;
      });
    }
  </script>
</body>
</html>
